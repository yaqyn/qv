# Orion window and layer visuals.
# Omarchy keeps app behavior; Orion only overrides presentation.

# Solid windows for Orion readability.
windowrule = opacity 1 1, match:tag default-opacity
windowrule = opacity 1 1, match:tag terminal
windowrule = opacity 1 1, match:tag chromium-based-browser
windowrule = opacity 1 1, match:tag firefox-based-browser
windowrule = opacity 1 1, match:tag floating-window
windowrule = opacity 1 1, match:tag pip

# Steam and Steam-launched games live on workspace 5.
windowrule = workspace 5 silent, match:class ^([Ss]team|steamwebhelper|steam_app_[0-9]+)$

# Orion screensaver owns the screen while active.
windowrule = fullscreen on, match:class org.omarchy.screensaver
windowrule = float on, match:class org.omarchy.screensaver
windowrule = animation slide, match:class org.omarchy.screensaver

# Sharp, borderless presentation.
windowrule = rounding 0, match:class .*
windowrule = border_size 0, match:class .*
windowrule = rounding 0, match:tag floating-window
windowrule = border_size 0, match:tag floating-window
windowrule = rounding 0, match:tag pop
windowrule = border_size 0, match:tag pop
windowrule = border_size 0, match:tag pip

# Layer surfaces.
layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, match:namespace walker
