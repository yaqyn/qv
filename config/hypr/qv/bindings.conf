bindd = SUPER CTRL, Z, OpenCode location, exec, ~/.local/share/qvos/hyprland/qvos-launch-tui-menu opencode "OpenCode"
bindd = SUPER SHIFT CTRL ALT, A, AI chats, exec, ~/.local/share/qvos/hyprland/qvos-ai-chat-menu
unbind = SUPER SHIFT CTRL, UP
bindd = SUPER SHIFT CTRL, UP, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float + 1)')
unbind = SUPER SHIFT CTRL, DOWN
bindd = SUPER SHIFT CTRL, DOWN, Zoom out, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq 'if .float <= 1 then 1 else .float - 1 end')
unbind = SUPER SHIFT CTRL, RIGHT
bindd = SUPER SHIFT CTRL, RIGHT, Move window to next workspace, exec, ~/.local/share/qvos/hyprland/qvos-move-window-workspace next
unbind = SUPER SHIFT CTRL, LEFT
bindd = SUPER SHIFT CTRL, LEFT, Move window to previous workspace, exec, ~/.local/share/qvos/hyprland/qvos-move-window-workspace prev
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT
bindd = SUPER CTRL, RIGHT, Next workspace, workspace, +1
bindd = SUPER CTRL, LEFT, Previous workspace, workspace, -1
unbind = SUPER CTRL, V
unbind = SUPER CTRL ALT, V
unbind = SUPER, PERIOD
bindd = SUPER, PERIOD, Clipboard manager, exec, omarchy-launch-walker -m clipboard
unbind = SUPER CTRL, X
unbind = SUPER CTRL ALT, X
