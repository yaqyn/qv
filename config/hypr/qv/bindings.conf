# qvOS keybinding overrides.
unbind = SUPER, RETURN
bindd = SUPER, RETURN, Terminal, exec, ~/.local/share/qvos/hyprland/qvos-launch-terminal-here terminal
unbind = SUPER SHIFT, RETURN
bindd = SUPER SHIFT, RETURN, Terminal here, exec, ~/.local/share/qvos/hyprland/qvos-thunar-or-here terminal
unbind = SUPER ALT, RETURN
bindd = SUPER ALT, RETURN, Current tmux session, exec, ~/.local/share/qvos/hyprland/qvos-tmux-session-menu current
unbind = SUPER SHIFT ALT, RETURN
bindd = SUPER SHIFT ALT, RETURN, Tmux menu, exec, ~/.local/share/qvos/hyprland/qvos-tmux-session-menu attach
unbind = SUPER CTRL ALT, SPACE
bindd = SUPER CTRL ALT, SPACE, Favorites, exec, ~/.local/share/qvos/hyprland/qvos-favorites-menu
unbind = SUPER CTRL, RETURN
bindd = SUPER CTRL, RETURN, Terminal menu, exec, ~/.local/share/qvos/hyprland/qvos-launch-tui-menu terminal "Terminal"
unbind = SUPER SHIFT CTRL, RETURN
bindd = SUPER SHIFT CTRL, RETURN, Root terminal here, exec, ~/.local/share/qvos/hyprland/qvos-launch-terminal-here root
unbind = SUPER CTRL ALT, RETURN
bindd = SUPER CTRL ALT, RETURN, Tmux location picker, exec, ~/.local/share/qvos/hyprland/qvos-launch-tui-menu tmux "Tmux"
unbind = SUPER SHIFT CTRL ALT, RETURN
bindd = SUPER SHIFT CTRL ALT, RETURN, Quick save tmux, exec, ~/.local/share/qvos/hyprland/qvos-tmux-save-now quick
unbind = SUPER, grave
bindd = SUPER, grave, Workspace 5, workspace, 5
unbind = SUPER SHIFT CTRL ALT, BACKSPACE
bindd = SUPER SHIFT CTRL ALT, BACKSPACE, qvOS screensaver, exec, omarchy-launch-screensaver force
unbind = SUPER CTRL, C
unbind = SUPER CTRL ALT, C
unbind = SUPER SHIFT, PRINT
bindd = SUPER SHIFT, PRINT, Capture menu, exec, omarchy-menu capture
unbind = SUPER CTRL, Z
unbind = SUPER CTRL ALT, Z
unbind = SUPER SHIFT CTRL ALT, Z
unbind = SUPER SHIFT CTRL ALT, A
unbind = SUPER SHIFT ALT, C
unbind = SUPER SHIFT ALT, V
unbind = SUPER SHIFT ALT, X
