# qvOS appearance overrides.

animations {
  # Omarchy defaults special workspaces to slidevert. qvOS uses a left-side
  # Codex sidebar, so make special workspace toggles slide in and out there.
  animation = specialWorkspace, 1, 2.4, easeInOutCubic, slide left
  animation = specialWorkspaceIn, 1, 2.4, easeInOutCubic, slide left
  animation = specialWorkspaceOut, 1, 2.1, easeInOutCubic, slide right
}
