# qvOS window and layer rules.

# qvOS picker/defaults terminals should behave like tool windows.
windowrule = float on, match:class org.qvos.folder-picker
windowrule = size 980 620, match:class org.qvos.folder-picker
windowrule = center on, match:class org.qvos.folder-picker
windowrule = border_size 0, match:class org.qvos.folder-picker
windowrule = float on, match:class org.qvos.defaults-installer
windowrule = size 980 620, match:class org.qvos.defaults-installer
windowrule = center on, match:class org.qvos.defaults-installer

# Codex sidebar is a persistent left-side overlay.
windowrule = float on, match:class org.qvos.codex-sidebar
windowrule = workspace special:qvos-codex-sidebar silent, match:class org.qvos.codex-sidebar
windowrule = size 720 100%, match:class org.qvos.codex-sidebar
windowrule = move 0 0, match:class org.qvos.codex-sidebar
windowrule = border_size 0, match:class org.qvos.codex-sidebar
windowrule = rounding 0, match:class org.qvos.codex-sidebar
windowrule = float on, match:class org.qvos.codex-sidebar-corner
windowrule = workspace special:qvos-codex-sidebar silent, match:class org.qvos.codex-sidebar-corner
windowrule = size 18 18, match:class org.qvos.codex-sidebar-corner
windowrule = move 720 26, match:class org.qvos.codex-sidebar-corner
windowrule = border_size 0, match:class org.qvos.codex-sidebar-corner
windowrule = rounding 0, match:class org.qvos.codex-sidebar-corner

# qvOS screensaver owns the screen while active.
windowrule = fullscreen on, match:class org.omarchy.screensaver
windowrule = float on, match:class org.omarchy.screensaver
windowrule = animation slide, match:class org.omarchy.screensaver

# Steam and Steam-launched games live on workspace G.
windowrule = workspace name:G silent, match:class ^([Ss]team|steamwebhelper|steam_app_[0-9]+)$

# Keep Thunar dialogs and file-operation popups detached from tiled folder windows.
windowrule = float on, match:class ^thunar$, match:modal 1
windowrule = center on, match:class ^thunar$, match:modal 1
windowrule = float on, match:class ^thunar$, match:title ^(File Operation Progress|Confirm to replace files|.*(Rename|Copy|Move|Delete).*)$
windowrule = center on, match:class ^thunar$, match:title ^(File Operation Progress|Confirm to replace files|.*(Rename|Copy|Move|Delete).*)$
